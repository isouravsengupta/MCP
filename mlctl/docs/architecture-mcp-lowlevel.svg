<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="860" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">mlctl MCP — Detailed Architecture of Flow</text>
  <text x="600" y="68" text-anchor="middle" font-size="14" fill="#8b949e">Step-by-step: Slack DM → MCP Server → LLM → Tools → Data → Response</text>

  <!-- ═══ STEP NODES (horizontal flow with numbered steps) ═══ -->

  <!-- Step labels row -->
  <text x="600" y="100" text-anchor="middle" font-size="12" fill="#6b6f76" font-style="italic">Follow the numbered steps left → right → down → left for the full request lifecycle</text>

  <!-- ─── TOP ROW (steps 1–5): REQUEST IN ─── -->

  <!-- Step 1: Engineer sends message -->
  <rect x="30" y="120" width="190" height="100" rx="10" fill="#1c2128" stroke="#4ecdc4" stroke-width="2"/>
  <circle cx="62" cy="142" r="14" fill="#4ecdc4"/>
  <text x="62" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">1</text>
  <text x="125" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Engineer</text>
  <text x="125" y="165" text-anchor="middle" font-size="12" fill="#8b949e">sends DM to</text>
  <text x="125" y="181" text-anchor="middle" font-size="12" fill="#4ecdc4">@mlctl in Slack</text>
  <text x="125" y="200" text-anchor="middle" font-size="11" fill="#6b6f76">"show experiments"</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="170" x2="258" y2="170" stroke="#4ecdc4" stroke-width="2"/>
  <polygon points="255,165 263,170 255,175" fill="#4ecdc4"/>

  <!-- Step 2: Slack API Gateway -->
  <rect x="260" y="120" width="190" height="100" rx="10" fill="#1c2128" stroke="#f0883e" stroke-width="2"/>
  <circle cx="292" cy="142" r="14" fill="#f0883e"/>
  <text x="292" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">2</text>
  <text x="355" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Slack Events API</text>
  <text x="355" y="165" text-anchor="middle" font-size="12" fill="#8b949e">AWS API Gateway</text>
  <text x="355" y="181" text-anchor="middle" font-size="12" fill="#f0883e">Lambda handler</text>
  <text x="355" y="200" text-anchor="middle" font-size="11" fill="#6b6f76">Validates signature + JWT</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="170" x2="488" y2="170" stroke="#f0883e" stroke-width="2"/>
  <polygon points="485,165 493,170 485,175" fill="#f0883e"/>

  <!-- Step 3: FastAPI -->
  <rect x="490" y="120" width="190" height="100" rx="10" fill="#1c2128" stroke="#ff7b72" stroke-width="2"/>
  <circle cx="522" cy="142" r="14" fill="#ff7b72"/>
  <text x="522" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">3</text>
  <text x="585" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">FastAPI Server</text>
  <text x="585" y="165" text-anchor="middle" font-size="12" fill="#8b949e">web/app.py</text>
  <text x="585" y="181" text-anchor="middle" font-size="12" fill="#ff7b72">POST /chat</text>
  <text x="585" y="200" text-anchor="middle" font-size="11" fill="#6b6f76">Routes to MLOrchestrator</text>

  <!-- Arrow 3→4 -->
  <line x1="680" y1="170" x2="718" y2="170" stroke="#ff7b72" stroke-width="2"/>
  <polygon points="715,165 723,170 715,175" fill="#ff7b72"/>

  <!-- Step 4: Orchestrator -->
  <rect x="720" y="120" width="210" height="100" rx="10" fill="#1c2128" stroke="#ff7b72" stroke-width="2"/>
  <circle cx="752" cy="142" r="14" fill="#ff7b72"/>
  <text x="752" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">4</text>
  <text x="825" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">MLOrchestrator</text>
  <text x="825" y="165" text-anchor="middle" font-size="12" fill="#8b949e">Checks: is_conversational?</text>
  <text x="825" y="181" text-anchor="middle" font-size="12" fill="#ff7b72">Builds message history</text>
  <text x="825" y="200" text-anchor="middle" font-size="11" fill="#6b6f76">Prepares tools list</text>

  <!-- Arrow 4→5 -->
  <line x1="930" y1="170" x2="968" y2="170" stroke="#a371f7" stroke-width="2"/>
  <polygon points="965,165 973,170 965,175" fill="#a371f7"/>

  <!-- Step 5: LLM Call -->
  <rect x="970" y="120" width="200" height="100" rx="10" fill="#1c2128" stroke="#a371f7" stroke-width="2"/>
  <circle cx="1002" cy="142" r="14" fill="#a371f7"/>
  <text x="1002" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">5</text>
  <text x="1070" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">LLM Call</text>
  <text x="1070" y="165" text-anchor="middle" font-size="12" fill="#8b949e">LiteLLMAdapter.chat()</text>
  <text x="1070" y="181" text-anchor="middle" font-size="12" fill="#a371f7">tools=TOOLS passed</text>
  <text x="1070" y="200" text-anchor="middle" font-size="11" fill="#6b6f76">Ollama / OpenAI / Claude</text>

  <!-- Down arrow 5→6 -->
  <line x1="1070" y1="220" x2="1070" y2="258" stroke="#a371f7" stroke-width="2"/>
  <polygon points="1065,255 1075,255 1070,263" fill="#a371f7"/>

  <!-- ─── MIDDLE ROW (steps 6–9): TOOL EXECUTION ─── -->

  <!-- Step 6: LLM returns tool_calls -->
  <rect x="970" y="260" width="200" height="100" rx="10" fill="#1c2128" stroke="#a371f7" stroke-width="2"/>
  <circle cx="1002" cy="282" r="14" fill="#a371f7"/>
  <text x="1002" y="287" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">6</text>
  <text x="1070" y="288" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">LLM Response</text>
  <text x="1070" y="305" text-anchor="middle" font-size="12" fill="#8b949e">Returns tool_calls JSON</text>
  <text x="1070" y="321" text-anchor="middle" font-size="12" fill="#a371f7">{name, arguments}</text>
  <text x="1070" y="340" text-anchor="middle" font-size="11" fill="#6b6f76">e.g. list_experiments(limit=5)</text>

  <!-- Arrow 6→7 (right to left) -->
  <line x1="970" y1="310" x2="932" y2="310" stroke="#3fb950" stroke-width="2"/>
  <polygon points="935,305 927,310 935,315" fill="#3fb950"/>

  <!-- Step 7: Tool Dispatch -->
  <rect x="720" y="260" width="210" height="100" rx="10" fill="#1c2128" stroke="#3fb950" stroke-width="2"/>
  <circle cx="752" cy="282" r="14" fill="#3fb950"/>
  <text x="752" y="287" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">7</text>
  <text x="825" y="288" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Tool Dispatch</text>
  <text x="825" y="305" text-anchor="middle" font-size="12" fill="#8b949e">_dispatch_tool(name, args)</text>
  <text x="825" y="321" text-anchor="middle" font-size="12" fill="#3fb950">ExperimentTools</text>
  <text x="825" y="337" text-anchor="middle" font-size="12" fill="#3fb950">ModelTools · PipelineTools</text>

  <!-- Arrow 7→8 -->
  <line x1="720" y1="310" x2="682" y2="310" stroke="#3fb950" stroke-width="2"/>
  <polygon points="685,305 677,310 685,315" fill="#3fb950"/>

  <!-- Step 8: DB / API Query -->
  <rect x="490" y="260" width="190" height="100" rx="10" fill="#1c2128" stroke="#58a6ff" stroke-width="2"/>
  <circle cx="522" cy="282" r="14" fill="#58a6ff"/>
  <text x="522" y="287" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">8</text>
  <text x="585" y="288" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Data Query</text>
  <text x="585" y="305" text-anchor="middle" font-size="12" fill="#8b949e">SQLite (demo)</text>
  <text x="585" y="321" text-anchor="middle" font-size="12" fill="#58a6ff">Athena / RDS (prod)</text>
  <text x="585" y="340" text-anchor="middle" font-size="11" fill="#6b6f76">NL → SQL → results</text>

  <!-- Arrow 8→9 -->
  <line x1="490" y1="310" x2="452" y2="310" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="455,305 447,310 455,315" fill="#58a6ff"/>

  <!-- Step 9: Results returned -->
  <rect x="260" y="260" width="190" height="100" rx="10" fill="#1c2128" stroke="#3fb950" stroke-width="2"/>
  <circle cx="292" cy="282" r="14" fill="#3fb950"/>
  <text x="292" y="287" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">9</text>
  <text x="355" y="288" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Tool Results</text>
  <text x="355" y="305" text-anchor="middle" font-size="12" fill="#8b949e">JSON appended to</text>
  <text x="355" y="321" text-anchor="middle" font-size="12" fill="#3fb950">conversation history</text>
  <text x="355" y="340" text-anchor="middle" font-size="11" fill="#6b6f76">role: "tool"</text>

  <!-- Down arrow 9→10 -->
  <line x1="355" y1="360" x2="355" y2="398" stroke="#f0883e" stroke-width="2"/>
  <polygon points="350,395 360,395 355,403" fill="#f0883e"/>

  <!-- ─── BOTTOM ROW (steps 10–13): SYNTHESIS & RESPONSE ─── -->

  <!-- Step 10: Synthesis nudge -->
  <rect x="260" y="400" width="190" height="110" rx="10" fill="#1c2128" stroke="#f0883e" stroke-width="2"/>
  <circle cx="292" cy="422" r="14" fill="#f0883e"/>
  <text x="292" y="427" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">10</text>
  <text x="355" y="428" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Synthesis Nudge</text>
  <text x="355" y="445" text-anchor="middle" font-size="12" fill="#8b949e">Orchestrator adds:</text>
  <text x="355" y="461" text-anchor="middle" font-size="11" fill="#f0883e">"Summarise results.</text>
  <text x="355" y="476" text-anchor="middle" font-size="11" fill="#f0883e"> Do not call more tools."</text>
  <text x="355" y="496" text-anchor="middle" font-size="11" fill="#6b6f76">tools=None passed to LLM</text>

  <!-- Arrow 10→11 -->
  <line x1="450" y1="455" x2="488" y2="455" stroke="#a371f7" stroke-width="2"/>
  <polygon points="485,450 493,455 485,460" fill="#a371f7"/>

  <!-- Step 11: LLM synthesis -->
  <rect x="490" y="400" width="190" height="110" rx="10" fill="#1c2128" stroke="#a371f7" stroke-width="2"/>
  <circle cx="522" cy="422" r="14" fill="#a371f7"/>
  <text x="522" y="427" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">11</text>
  <text x="585" y="428" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">LLM Synthesis</text>
  <text x="585" y="445" text-anchor="middle" font-size="12" fill="#8b949e">Reads all tool results</text>
  <text x="585" y="461" text-anchor="middle" font-size="12" fill="#a371f7">Generates clean summary</text>
  <text x="585" y="477" text-anchor="middle" font-size="12" fill="#8b949e">Markdown formatted</text>
  <text x="585" y="496" text-anchor="middle" font-size="11" fill="#6b6f76">No further tool calls</text>

  <!-- Arrow 11→12 -->
  <line x1="680" y1="455" x2="718" y2="455" stroke="#3fb950" stroke-width="2"/>
  <polygon points="715,450 723,455 715,460" fill="#3fb950"/>

  <!-- Step 12: Response + Charts -->
  <rect x="720" y="400" width="210" height="110" rx="10" fill="#1c2128" stroke="#3fb950" stroke-width="2"/>
  <circle cx="752" cy="422" r="14" fill="#3fb950"/>
  <text x="752" y="427" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">12</text>
  <text x="825" y="428" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Response + Charts</text>
  <text x="825" y="445" text-anchor="middle" font-size="12" fill="#8b949e">FastAPI returns JSON</text>
  <text x="825" y="461" text-anchor="middle" font-size="12" fill="#3fb950">{response, tool_calls}</text>
  <text x="825" y="477" text-anchor="middle" font-size="12" fill="#8b949e">Chart.js auto-renders</text>
  <text x="825" y="496" text-anchor="middle" font-size="11" fill="#6b6f76">accuracy · loss · F1 charts</text>

  <!-- Arrow 12→13 -->
  <line x1="930" y1="455" x2="968" y2="455" stroke="#4ecdc4" stroke-width="2"/>
  <polygon points="965,450 973,455 965,460" fill="#4ecdc4"/>

  <!-- Step 13: Slack response -->
  <rect x="970" y="400" width="200" height="110" rx="10" fill="#1c2128" stroke="#4ecdc4" stroke-width="2"/>
  <circle cx="1002" cy="422" r="14" fill="#4ecdc4"/>
  <text x="1002" y="427" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">13</text>
  <text x="1070" y="428" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Delivered to User</text>
  <text x="1070" y="445" text-anchor="middle" font-size="12" fill="#8b949e">Lambda posts to Slack</text>
  <text x="1070" y="461" text-anchor="middle" font-size="12" fill="#4ecdc4">Rich message + charts</text>
  <text x="1070" y="477" text-anchor="middle" font-size="12" fill="#8b949e">Web UI renders inline</text>
  <text x="1070" y="496" text-anchor="middle" font-size="11" fill="#6b6f76">Full lifecycle complete</text>

  <!-- ─── SIDE PANEL: LLM OPTIONS ─── -->
  <rect x="30" y="260" width="190" height="250" rx="10" fill="#161b22" stroke="#a371f7" stroke-width="1.5"/>
  <text x="125" y="284" text-anchor="middle" font-size="13" font-weight="700" fill="#a371f7">LLM Options</text>
  <rect x="48" y="294" width="154" height="32" rx="6" fill="#1c2128" stroke="#a371f7"/>
  <text x="125" y="315" text-anchor="middle" font-size="12" fill="#c9d1d9">Netflix Internal LLM</text>
  <rect x="48" y="334" width="154" height="32" rx="6" fill="#1c2128" stroke="#6e7681"/>
  <text x="125" y="355" text-anchor="middle" font-size="12" fill="#c9d1d9">OpenAI GPT-4o</text>
  <rect x="48" y="374" width="154" height="32" rx="6" fill="#1c2128" stroke="#6e7681"/>
  <text x="125" y="395" text-anchor="middle" font-size="12" fill="#c9d1d9">Anthropic Claude</text>
  <rect x="48" y="414" width="154" height="32" rx="6" fill="#1c2128" stroke="#3fb950"/>
  <text x="125" y="435" text-anchor="middle" font-size="12" fill="#3fb950">Ollama (local, free)</text>
  <rect x="48" y="454" width="154" height="32" rx="6" fill="#1c2128" stroke="#6e7681"/>
  <text x="125" y="475" text-anchor="middle" font-size="12" fill="#c9d1d9">Azure / Bedrock</text>

  <!-- ─── BOTTOM: KEY DESIGN DECISIONS ─── -->
  <rect x="30" y="540" width="1140" height="110" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="600" y="564" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Key Design Decisions</text>

  <rect x="60" y="576" width="260" height="60" rx="8" fill="#1c2128" stroke="#ff7b72"/>
  <text x="190" y="595" text-anchor="middle" font-size="12" font-weight="600" fill="#ff7b72">Conversational Guard</text>
  <text x="190" y="612" text-anchor="middle" font-size="11" fill="#8b949e">Short/casual messages bypass tools</text>
  <text x="190" y="628" text-anchor="middle" font-size="11" fill="#6b6f76">Prevents tool spam on "hey" / "hi"</text>

  <rect x="350" y="576" width="260" height="60" rx="8" fill="#1c2128" stroke="#a371f7"/>
  <text x="480" y="595" text-anchor="middle" font-size="12" font-weight="600" fill="#a371f7">Model-Agnostic Adapter</text>
  <text x="480" y="612" text-anchor="middle" font-size="11" fill="#8b949e">Swap LLM without touching agent logic</text>
  <text x="480" y="628" text-anchor="middle" font-size="11" fill="#6b6f76">BaseModelAdapter ABC pattern</text>

  <rect x="640" y="576" width="260" height="60" rx="8" fill="#1c2128" stroke="#58a6ff"/>
  <text x="770" y="595" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">Text-to-SQL</text>
  <text x="770" y="612" text-anchor="middle" font-size="11" fill="#8b949e">NL question → LLM generates SQL</text>
  <text x="770" y="628" text-anchor="middle" font-size="11" fill="#6b6f76">Executes on real DB, returns rows</text>

  <rect x="930" y="576" width="210" height="60" rx="8" fill="#1c2128" stroke="#3fb950"/>
  <text x="1035" y="595" text-anchor="middle" font-size="12" font-weight="600" fill="#3fb950">No-Loop Fix</text>
  <text x="1035" y="612" text-anchor="middle" font-size="11" fill="#8b949e">tools=None after first tool batch</text>
  <text x="1035" y="628" text-anchor="middle" font-size="11" fill="#6b6f76">Synthesis nudge message</text>

  <!-- Footer -->
  <text x="600" y="672" text-anchor="middle" font-size="11" fill="#484f58">github.com/isouravsengupta/MCP/mlctl · Built by Sourav Sengupta</text>
</svg>
