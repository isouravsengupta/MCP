# CRMA Dataset: Global SPM Performance Dashboard
# Snowflake source: replace with your actual table/view name
# This file is the business-logic source of truth for the SPM pilot agreed in the
# Agent Roundtable (2026-06-05). All metric SQL expressions replicate the calculations
# visible in the CRMA dashboard so that Snowflake results match what stakeholders see.
#
# HOW TO EXTEND:
#   1. Add rows to `columns` for any CRMA field not yet mapped.
#   2. Add rows to `metrics` for any KPI you want the agent to be able to retrieve.
#   3. SQL expressions can reference any column by its snowflake_name.

snowflake_table: SALES_PLANNING.SPM_PERFORMANCE_V   # <-- update to your actual view/table

columns:
  # ── Dimensions ──────────────────────────────────────────────────────────
  - crma_name: fiscal_year
    snowflake_name: FISCAL_YEAR
    data_type: VARCHAR
    description: "Fiscal year identifier, e.g. FY27. Always starts 1 Feb."

  - crma_name: fiscal_quarter
    snowflake_name: FISCAL_QUARTER
    data_type: VARCHAR
    description: "Fiscal quarter, e.g. Q1FY27."

  - crma_name: region
    snowflake_name: REGION
    data_type: VARCHAR
    description: "Sales region, e.g. EMEA, AMER, APAC."

  - crma_name: segment
    snowflake_name: SEGMENT
    data_type: VARCHAR
    description: "Market segment: ENTR, CMRCL, SMB."

  - crma_name: program_name
    snowflake_name: PROGRAM_NAME
    data_type: VARCHAR
    description: "Name of the sales programme."

  - crma_name: program_id
    snowflake_name: PROGRAM_ID
    data_type: VARCHAR
    description: "Unique identifier for the sales programme."

  - crma_name: spm_owner
    snowflake_name: SPM_OWNER_EMAIL
    data_type: VARCHAR
    description: "Email of the Sales Programme Manager who owns the programme."

  - crma_name: target_account_count
    snowflake_name: TARGET_ACCOUNT_COUNT
    data_type: NUMBER
    description: "Number of accounts in the programme's target list."

  # ── Measures ─────────────────────────────────────────────────────────────
  - crma_name: acv_influenced
    snowflake_name: ACV_INFLUENCED
    data_type: NUMBER
    description: "Total ACV of opportunities influenced by this programme ($)."

  - crma_name: acv_target
    snowflake_name: ACV_TARGET
    data_type: NUMBER
    description: "ACV target set for this programme at the start of the quarter ($)."

  - crma_name: nnaov_influenced
    snowflake_name: NNAOV_INFLUENCED
    data_type: NUMBER
    description: "Net New AOV influenced by this programme ($)."

  - crma_name: nnaov_target
    snowflake_name: NNAOV_TARGET
    data_type: NUMBER
    description: "NNAOV target for this programme ($)."

  - crma_name: pipeline_generated
    snowflake_name: PIPELINE_GENERATED
    data_type: NUMBER
    description: "Total pipeline value generated by this programme ($)."

  - crma_name: pipeline_target
    snowflake_name: PIPELINE_TARGET
    data_type: NUMBER
    description: "Pipeline generation target for this programme ($)."

  - crma_name: compliance_rate
    snowflake_name: COMPLIANCE_RATE
    data_type: FLOAT
    description: "Percentage of target accounts that are compliant (0–1)."

metrics:
  - key: acv_attainment_pct
    label: "ACV Attainment %"
    description: "Percentage of ACV target achieved. Matches the 'ACV Attainment' tile in CRMA."
    sql_expression: >-
      ROUND(
        CASE WHEN SUM(ACV_TARGET) = 0 THEN NULL
             ELSE SUM(ACV_INFLUENCED) / SUM(ACV_TARGET) * 100
        END, 2
      )

  - key: nnaov_attainment_pct
    label: "NNAOV Attainment %"
    description: "Percentage of NNAOV target achieved."
    sql_expression: >-
      ROUND(
        CASE WHEN SUM(NNAOV_TARGET) = 0 THEN NULL
             ELSE SUM(NNAOV_INFLUENCED) / SUM(NNAOV_TARGET) * 100
        END, 2
      )

  - key: pipeline_attainment_pct
    label: "Pipeline Attainment %"
    description: "Percentage of pipeline generation target achieved."
    sql_expression: >-
      ROUND(
        CASE WHEN SUM(PIPELINE_TARGET) = 0 THEN NULL
             ELSE SUM(PIPELINE_GENERATED) / SUM(PIPELINE_TARGET) * 100
        END, 2
      )

  - key: total_acv_influenced
    label: "Total ACV Influenced ($)"
    description: "Sum of ACV influenced across all programmes matching the filter."
    sql_expression: "SUM(ACV_INFLUENCED)"

  - key: total_pipeline_generated
    label: "Total Pipeline Generated ($)"
    description: "Sum of pipeline generated across all programmes matching the filter."
    sql_expression: "SUM(PIPELINE_GENERATED)"

  - key: avg_compliance_rate
    label: "Avg Compliance Rate %"
    description: "Average compliance rate across programmes, as a percentage."
    sql_expression: "ROUND(AVG(COMPLIANCE_RATE) * 100, 2)"

  - key: programme_count
    label: "Programme Count"
    description: "Number of distinct programmes matching the filter."
    sql_expression: "COUNT(DISTINCT PROGRAM_ID)"
