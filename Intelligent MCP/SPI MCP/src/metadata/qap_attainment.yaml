# CRMA Dataset: QAP Attainment / Quota Attainment Plan
# Snowflake source: replace with your actual table/view name
# Covers the QAP Quality Score and attainment metrics surfaced for Markus's org.

snowflake_table: SALES_PLANNING.QAP_ATTAINMENT_V   # <-- update to your actual view/table

columns:
  # ── Dimensions ──────────────────────────────────────────────────────────
  - crma_name: fiscal_year
    snowflake_name: FISCAL_YEAR
    data_type: VARCHAR
    description: "Fiscal year identifier, e.g. FY27."

  - crma_name: fiscal_quarter
    snowflake_name: FISCAL_QUARTER
    data_type: VARCHAR
    description: "Fiscal quarter, e.g. Q1FY27."

  - crma_name: region
    snowflake_name: REGION
    data_type: VARCHAR
    description: "Sales region."

  - crma_name: segment
    snowflake_name: SEGMENT
    data_type: VARCHAR
    description: "Market segment: ENTR, CMRCL, SMB."

  - crma_name: seller_email
    snowflake_name: SELLER_EMAIL
    data_type: VARCHAR
    description: "Salesforce email of the individual seller."

  - crma_name: manager_email
    snowflake_name: MANAGER_EMAIL
    data_type: VARCHAR
    description: "Email of the seller's direct manager."

  - crma_name: role
    snowflake_name: SELLING_ROLE
    data_type: VARCHAR
    description: "Selling role, e.g. AE, GAM, KAD."

  # ── Measures ─────────────────────────────────────────────────────────────
  - crma_name: quota_acv
    snowflake_name: QUOTA_ACV
    data_type: NUMBER
    description: "Assigned ACV quota for the period ($)."

  - crma_name: attained_acv
    snowflake_name: ATTAINED_ACV
    data_type: NUMBER
    description: "ACV closed-won in the period ($)."

  - crma_name: quota_nnaov
    snowflake_name: QUOTA_NNAOV
    data_type: NUMBER
    description: "Assigned NNAOV quota for the period ($)."

  - crma_name: attained_nnaov
    snowflake_name: ATTAINED_NNAOV
    data_type: NUMBER
    description: "NNAOV closed-won in the period ($)."

  - crma_name: qap_quality_score
    snowflake_name: QAP_QUALITY_SCORE
    data_type: FLOAT
    description: "QAP quality score (0–100). Based on completeness + accuracy of the seller's plan."

  - crma_name: open_pipeline
    snowflake_name: OPEN_PIPELINE
    data_type: NUMBER
    description: "Value of open pipeline at snapshot date ($)."

  - crma_name: day1_open_pipe
    snowflake_name: DAY1_OPEN_PIPELINE
    data_type: NUMBER
    description: "Day 1 open pipeline at the start of the quarter ($)."

metrics:
  - key: acv_attainment_pct
    label: "ACV Attainment %"
    description: "Individual/group ACV attainment as a % of quota."
    sql_expression: >-
      ROUND(
        CASE WHEN SUM(QUOTA_ACV) = 0 THEN NULL
             ELSE SUM(ATTAINED_ACV) / SUM(QUOTA_ACV) * 100
        END, 2
      )

  - key: nnaov_attainment_pct
    label: "NNAOV Attainment %"
    description: "Individual/group NNAOV attainment as a % of quota."
    sql_expression: >-
      ROUND(
        CASE WHEN SUM(QUOTA_NNAOV) = 0 THEN NULL
             ELSE SUM(ATTAINED_NNAOV) / SUM(QUOTA_NNAOV) * 100
        END, 2
      )

  - key: avg_qap_quality_score
    label: "Avg QAP Quality Score"
    description: "Average QAP quality score across sellers in the filter."
    sql_expression: "ROUND(AVG(QAP_QUALITY_SCORE), 1)"

  - key: seller_count
    label: "Seller Count"
    description: "Number of distinct sellers matching the filter."
    sql_expression: "COUNT(DISTINCT SELLER_EMAIL)"

  - key: total_open_pipeline
    label: "Total Open Pipeline ($)"
    description: "Sum of open pipeline value across sellers in the filter."
    sql_expression: "SUM(OPEN_PIPELINE)"

  - key: pipeline_coverage_ratio
    label: "Pipeline Coverage Ratio"
    description: "Open pipeline as a multiple of remaining quota. >3x is healthy."
    sql_expression: >-
      ROUND(
        CASE WHEN SUM(QUOTA_ACV) - SUM(ATTAINED_ACV) <= 0 THEN NULL
             ELSE SUM(OPEN_PIPELINE) / (SUM(QUOTA_ACV) - SUM(ATTAINED_ACV))
        END, 2
      )
